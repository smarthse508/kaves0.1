services:
  # 1. Backend Server
  server:
    build: ./server
    ports:
      - "5454:5454"
    env_file:
      - ./server/.env
    depends_on:
      - mongo

  # 2. Open3D Floorplan (SvelteKit)
  floorplan:
    build: ./open3dFloorplan-main
    ports:
      - "5000:5000"
    env_file:
      - ./open3dFloorplan-main/.env

  # 3. Client Frontend (Vite)
  client:
    build: ./client
    ports:
      - "4000:4000"
    env_file:
      - ./client/.env

  # 4. Database
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: